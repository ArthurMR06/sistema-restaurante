<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerente - Painel Profissional</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; text-align: center; color: #333; margin: 0; padding: 20px; }
        .container { background: white; padding: 25px; margin: auto; width: 95%; max-width: 1100px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .grid-colunas { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .coluna { flex: 1; min-width: 280px; background: #fff; padding: 15px; border-radius: 10px; text-align: left; border: 1px solid #e0e0e0; }
        h3 { border-bottom: 3px solid #42A1FF; padding-bottom: 8px; color: #1D70FF; margin-top: 0; }
        label { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 6px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f9f9f9; }
        label:hover { background: #f0f7ff; }
        input[type="checkbox"] { transform: scale(1.2); }
        #form-produto { 
            display: none; background: #f9f9f9; border: 2px solid #42A1FF; 
            padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 600px; text-align: left;
        }
        .campo-grupo { margin-bottom: 15px; position: relative; }
        .campo-grupo label { display: block; font-weight: bold; margin-bottom: 5px; border: none; padding: 0; }
        .campo-grupo input, .campo-grupo select { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
        .controles { margin-top: 30px; }
        button { padding: 12px 24px; margin: 5px; font-size: 15px; cursor: pointer; border: none; border-radius: 8px; background: linear-gradient(135deg, #6BC1FF, #42A1FF); color: white; font-weight: 600; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-confirmar { background: #2ecc71; }
        .btn-cancelar { background: #95a5a6; }
        .btn-danger { background: #e74c3c; }
        
        .senha-container { position: relative; display: inline-block; width: 100%; }
        
        .olho-btn {
            position: absolute;
            right: -15px;
            top: 6px;
            cursor: pointer;
            font-size: 18px;
            user-select: none;
        }

        .campo-grupo .olho-btn {
            right: 6px;
            top: 31px; 
        }

        footer { margin-top: 40px; color: #888; font-size: 13px; }
    </style>
</head>
<body>

<div class="container" id="loginArea">
    <h2>🔑 Login do Gerente</h2>
    <div class="senha-container" style="max-width: 250px; margin: auto;">
        <input type="password" id="senha" placeholder="Senha" style="width:100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc;">
        <span class="olho-btn" onclick="toggleSenha('senha', 'iconeLogin')" id="iconeLogin">👁️</span>
    </div>
    <br><br>
    <button onclick="login()">Entrar no Sistema</button>
    <p id="erro" style="color:red"></p>
</div>

<div id="sistema" class="container" style="display:none">
    <h2>📋 Gestão de Cardápio</h2>
    
    <div id="form-produto">
        <h3 style="border:none">➕ Cadastrar Novo Item</h3>
        <div class="grid-colunas" style="margin-top:0">
            <div class="campo-grupo" style="flex:2">
                <label>Nome do Produto</label>
                <input type="text" id="novo-nome" placeholder="Ex: Filé de Frango">
            </div>
            <div class="campo-grupo" style="flex:1">
                <label>Categoria</label>
                <select id="novo-tipo">
                    <option value="carnes">Carnes</option>
                    <option value="acomp">Acompanhamentos</option>
                    <option value="bebidas">Bebidas</option>
                </select>
            </div>
        </div>

        <div class="grid-colunas" style="margin-top:0">
            <div class="campo-grupo">
                <label>Preço (R$)</label>
                <input type="number" id="novo-preco" step="0.01" placeholder="0.00">
            </div>
            <div class="campo-grupo">
                <label>adicional:</label>
                <input type="number" id="novo-adicional" step="0.01" placeholder="0.00">
            </div>
            <div class="campo-grupo">
                <label>Confirmar Senha</label>
                <input type="password" id="senha-confirmacao">
                <span class="olho-btn" onclick="toggleSenha('senha-confirmacao', 'iconeConf')" id="iconeConf">👁️</span>
            </div>
        </div>

        <button class="btn-confirmar" onclick="confirmarAdicao()">Salvar Produto</button>
        <button class="btn-cancelar" onclick="fecharFormulario()">Cancelar</button>
    </div>

    <div class="grid-colunas">
        <div class="coluna">
            <h3>🥩 Carnes</h3>
            <div id="lista-carnes"></div>
        </div>
        <div class="coluna">
            <h3>🍚 Acompanhamentos</h3>
            <div id="lista-acomp"></div>
        </div>
        <div class="coluna">
            <h3>🥤 Bebidas</h3>
            <div id="lista-bebidas"></div>
        </div>
    </div>

    <div class="controles">
        <button onclick="salvarCardapio()">💾 Sincronizar Cardápio do Dia</button>
        <button onclick="abrirFormulario()">✨ Novo Produto</button>
        <button class="btn-danger" onclick="excluirItens()">🗑️ Excluir Selecionados</button>
        <button onclick="window.open('funcionario.html', '_blank')" style="background: #555;">Tela do Funcionário ↗</button>
    </div>
</div>

<footer>© 2026 Arthur M. Rangel | Sistema Gerente v2.1</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOPhRR_S7Awx8T6Z8_zo2DPVP1hmrHttc",
        authDomain: "projeto-restaurante-1e87f.firebaseapp.com",
        databaseURL: "https://projeto-restaurante-1e87f-default-rtdb.firebaseio.com",
        projectId: "projeto-restaurante-1e87f",
        storageBucket: "projeto-restaurante-1e87f.firebasestorage.app",
        messagingSenderId: "723006543313",
        appId: "1:723006543313:web:b7a50bda103b0ec607bcf0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const SENHA_MESTRA = "gerente123";

    window.toggleSenha = (idInput, idIcone) => {
        const input = document.getElementById(idInput);
        const icone = document.getElementById(idIcone);
        input.type = (input.type === "password") ? "text" : "password";
        icone.innerText = (input.type === "password") ? "👁️" : "🚫";
    };

    window.login = () => {
        const senhaDigitada = document.getElementById("senha").value;
        if(senhaDigitada === SENHA_MESTRA){
            document.getElementById("loginArea").style.display="none";
            document.getElementById("sistema").style.display="block";
            carregarDadosIniciais();
        } else {
            document.getElementById("erro").innerText = "Senha inválida!";
        }
    };

    window.abrirFormulario = () => {
        document.getElementById("form-produto").style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.fecharFormulario = () => {
        document.getElementById("form-produto").style.display = "none";
        document.getElementById("novo-nome").value = "";
        document.getElementById("novo-preco").value = "";
        document.getElementById("novo-adicional").value = "";
        document.getElementById("senha-confirmacao").value = "";
    };

    async function carregarDadosIniciais() {
        const snapProdutos = await get(ref(db, 'produtos'));
        const snapCardapio = await get(ref(db, 'cardapioDia'));
        
        const produtos = snapProdutos.val() || {};
        const selecionados = snapCardapio.val() || { carnes: [], acomp: [], bebidas: [] };

        renderizarGrade("carnes", produtos.carnes, selecionados.carnes);
        renderizarGrade("acomp", produtos.acomp, selecionados.acomp);
        renderizarGrade("bebidas", produtos.bebidas, selecionados.bebidas);
    }

    function renderizarGrade(tipo, lista, marcados) {
        const div = document.getElementById(`lista-${tipo}`);
        div.innerHTML = "";
        if(!lista) return;

        Object.keys(lista).forEach(nome => {
            const item = lista[nome];
            const isChecked = marcados && marcados.includes(nome) ? "checked" : "";
            div.innerHTML += `
                <label>
                    <input type="checkbox" class="${tipo}" data-nome="${nome}" ${isChecked}> 
                    <span><strong>${nome}</strong> <br> <small>Preço: R$ ${item.valor} | Adicional: R$ ${item.obs || '0.00'}</small></span>
                </label>`;
        });
    }

    window.confirmarAdicao = async function() {
        const nome = document.getElementById("novo-nome").value;
        const tipo = document.getElementById("novo-tipo").value;
        const preco = document.getElementById("novo-preco").value;
        let adicional = document.getElementById("novo-adicional").value;
        const senha = document.getElementById("senha-confirmacao").value;

        if(!nome || !preco) {
            alert("Preencha o nome e o preço!");
            return;
        }

        // Define como 0.00 caso nada seja colocado ou o campo esteja vazio
        if(adicional === "" || adicional === null) {
            adicional = "0.00";
        } else {
            // Garante que o número tenha duas casas decimais se for preenchido
            adicional = parseFloat(adicional).toFixed(2);
        }
        
        if(senha === SENHA_MESTRA) {
            await update(ref(db, `produtos/${tipo}`), {
                [nome]: { valor: parseFloat(preco).toFixed(2), obs: adicional }
            });
            alert("Produto cadastrado!");
            window.fecharFormulario();
            carregarDadosIniciais();
        } else {
            alert("Senha de gerente incorreta!");
        }
    };

    window.salvarCardapio = function() {
        const obterSelecionados = (classe) => 
            Array.from(document.querySelectorAll(`.${classe}:checked`)).map(i => i.getAttribute('data-nome'));

        set(ref(db, 'cardapioDia'), {
            carnes: obterSelecionados("carnes"),
            acomp: obterSelecionados("acomp"),
            bebidas: obterSelecionados("bebidas")
        }).then(() => alert("O cardápio do dia foi sincronizado!"));
    };

    window.excluirItens = async function() {
        const selecionados = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'));
        if(selecionados.length === 0) {
            alert("Selecione itens para excluir.");
            return;
        }

        const senha = prompt(`Deseja excluir permanentemente ${selecionados.length} item(s)? Confirme sua senha:`);
        
        if(senha === SENHA_MESTRA) {
            for (let check of selecionados) {
                const cat = check.className;
                const nome = check.getAttribute('data-nome');
                await set(ref(db, `produtos/${cat}/${nome}`), null);
            }
            carregarDadosIniciais();
            alert("Itens excluídos com sucesso.");
        } else {
            alert("Senha incorreta.");
        }
    };
</script>
</body>
</html>
