<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerente - Cardápio Dinâmico</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; text-align: center; color: #333; }
        .container { background: white; padding: 20px; margin: auto; width: 90%; max-width: 1000px; margin-top: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid-colunas { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
        .coluna { flex: 1; min-width: 250px; background: #fafafa; padding: 15px; border-radius: 8px; text-align: left; border: 1px solid #ddd; }
        h3 { border-bottom: 2px solid #6BC1FF; padding-bottom: 5px; color: #0056b3; }
        label { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; cursor: pointer; padding: 4px; border-radius: 4px; transition: 0.2s; }
        label:hover { background: #eef7ff; }
        
        .controles { margin-top: 30px; padding: 20px; border-top: 2px dashed #ccc; }
        button { padding: 10px 18px; margin: 5px; font-size: 14px; cursor: pointer; border: none; border-radius: 6px; background: linear-gradient(135deg, #6BC1FF, #42A1FF); color: white; font-weight: bold; transition: 0.3s; }
        button:hover { background: linear-gradient(135deg, #42A1FF, #1D70FF); transform: translateY(-1px); }
        .btn-danger { background: linear-gradient(135deg, #ff6b6b, #ee5253); }
        .btn-danger:hover { background: #d63031; }

        .campo-senha { position: relative; display: inline-block; }
        .campo-senha input { padding: 10px; width: 220px; border-radius: 6px; border: 1px solid #ccc; outline: none; }
        .olho { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; }
        footer { margin-top: 40px; padding-bottom: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="container" id="loginArea">
    <h2>Acesso Restrito - Gerente</h2>
    <div class="campo-senha">
        <input type="password" id="senha" placeholder="Digite a senha">
        <span class="olho" onclick="toggleSenha()" id="icone">👁️</span>
    </div>
    <br><br>
    <button onclick="login()">Acessar Painel</button>
    <p id="erro" style="color:red"></p>
</div>

<div id="sistema" class="container" style="display:none">
    <h2>Painel de Gerenciamento do Cardápio</h2>
    
    <div class="grid-colunas">
        <div class="coluna">
            <h3>🥩 Carnes</h3>
            <div id="lista-carnes"></div>
        </div>
        <div class="coluna">
            <h3>🍚 Acompanhamentos</h3>
            <div id="lista-acomp"></div>
        </div>
        <div class="coluna">
            <h3>🥤 Bebidas</h3>
            <div id="lista-bebidas"></div>
        </div>
    </div>

    <div class="controles">
        <button onclick="salvarCardapio()">Sincronizar Selecionados</button>
        <button onclick="adicionarProduto()">➕ Novo Produto</button>
        <button class="btn-danger" onclick="excluirItens()">🗑️ Excluir Selecionados</button>
        <button onclick="window.open('funcionario.html', '_blank')" style="background: #555;">Tela do Funcionário ↗</button>
    </div>
</div>

<footer>© 2026 Arthur M. Rangel | Gestão de Restaurante v2.0</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOPhRR_S7Awx8T6Z8_zo2DPVP1hmrHttc",
        authDomain: "projeto-restaurante-1e87f.firebaseapp.com",
        databaseURL: "https://projeto-restaurante-1e87f-default-rtdb.firebaseio.com",
        projectId: "projeto-restaurante-1e87f",
        storageBucket: "projeto-restaurante-1e87f.firebasestorage.app",
        messagingSenderId: "723006543313",
        appId: "1:723006543313:web:b7a50bda103b0ec607bcf0"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const SENHA_MESTRA = "gerente123";

    // --- FUNÇÕES GLOBAIS ---
    window.toggleSenha = () => {
        let input = document.getElementById("senha");
        let icone = document.getElementById("icone");
        input.type = (input.type === "password") ? "text" : "password";
        icone.innerText = (input.type === "password") ? "👁️" : "🚫";
    };

    window.login = () => {
        if(document.getElementById("senha").value === SENHA_MESTRA){
            document.getElementById("loginArea").style.display="none";
            document.getElementById("sistema").style.display="block";
            carregarTudo();
        } else {
            document.getElementById("erro").innerText = "Senha incorreta!";
        }
    };

    // Carrega produtos disponíveis e o que está marcado hoje
    async function carregarTudo() {
        const snapProdutos = await get(ref(db, 'produtos'));
        const snapCardapio = await get(ref(db, 'cardapioDia'));
        
        const produtos = snapProdutos.val() || {};
        const selecionados = snapCardapio.val() || { carnes: [], acomp: [], bebidas: [] };

        renderizarColuna("carnes", produtos.carnes, selecionados.carnes);
        renderizarColuna("acomp", produtos.acomp, selecionados.acomp);
        renderizarColuna("bebidas", produtos.bebidas, selecionados.bebidas);
    }

    function renderizarColuna(tipo, lista, marcados) {
        const div = document.getElementById(`lista-${tipo}`);
        div.innerHTML = "";
        if(!lista) return;

        Object.keys(lista).forEach(nome => {
            const item = lista[nome];
            const isChecked = marcados && marcados.includes(nome) ? "checked" : "";
            div.innerHTML += `
                <label>
                    <input type="checkbox" class="${tipo}" data-nome="${nome}" ${isChecked}> 
                    ${nome} ${item.valor ? '- R$' + item.valor : ''} ${item.obs ? '('+item.obs+')' : ''}
                </label>`;
        });
    }

    window.salvarCardapio = function() {
        const pegarCheckados = (classe) => 
            Array.from(document.querySelectorAll(`.${classe}:checked`)).map(i => i.getAttribute('data-nome'));

        set(ref(db, 'cardapioDia'), {
            carnes: pegarCheckados("carnes"),
            acomp: pegarCheckados("acomp"),
            bebidas: pegarCheckados("bebidas")
        }).then(() => alert("Cardápio do dia atualizado!"));
    };

    window.adicionarProduto = async function() {
        const nome = prompt("Nome do produto:");
        if(!nome) return;
        const valor = prompt("Valor (ex: 12.00):");
        const obs = prompt("Algum adicional ou observação? (Deixe vazio se não)");
        const categoria = prompt("Categoria (carnes, acomp ou bebidas):").toLowerCase();
        
        if(!['carnes', 'acomp', 'bebidas'].includes(categoria)) {
            alert("Categoria inválida!");
            return;
        }

        const senha = prompt("Confirme sua senha de gerente:");
        if(senha === SENHA_MESTRA) {
            await update(ref(db, `produtos/${categoria}`), {
                [nome]: { valor, obs }
            });
            alert("Produto adicionado com sucesso!");
            carregarTudo();
        } else {
            alert("Senha incorreta! Operação cancelada.");
        }
    };

    window.excluirItens = async function() {
        const selecionados = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'));
        
        if(selecionados.length === 0) return alert("Selecione itens para excluir.");

        const senha = prompt(`Deseja excluir ${selecionados.length} item(s)? Confirme sua senha:`);
        
        if(senha === SENHA_MESTRA) {
            for (let checkbox of selecionados) {
                const categoria = checkbox.className;
                const nome = checkbox.getAttribute('data-nome');
                await set(ref(db, `produtos/${categoria}/${nome}`), null);
            }
            alert("Itens removidos!");
            carregarTudo();
        } else {
            alert("Senha incorreta!");
        }
    };
</script>
</body>
</html>
